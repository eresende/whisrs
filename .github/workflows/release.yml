name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build release binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libxkbcommon-dev pkg-config

      - name: Build release binary (cloud backends)
        run: cargo build --release --locked --no-default-features

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/release/whisrs dist/
          cp target/release/whisrsd dist/
          tar -czf whisrs-${{ github.ref_name }}-x86_64-linux-gnu.tar.gz -C dist whisrs whisrsd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary
          path: whisrs-*.tar.gz

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: binary

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: whisrs-*.tar.gz

  publish:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang libasound2-dev libxkbcommon-dev pkg-config

      - name: Publish to crates.io
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
